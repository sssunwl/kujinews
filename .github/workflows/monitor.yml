name: KujiUniverse Daily Report

on:
  schedule:
    - cron: "0 0 * * *"   # 09:00 JST 每天一次
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build calendar data (kuji.json + ip_news.json)
        run: python scraper/build_data.py

      - name: Send daily TG report
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scraper/main.py

      - name: Commit updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/kuji.json docs/data/ip_news.json docs/data/tcg.json docs/images/tcg data/seen.json
          git diff --staged --quiet || git commit -m "chore: daily update [skip ci]"
          git push
