<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kuji宇宙</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="logo">Kuji宇宙</div>
    <nav class="main-nav">
      <button class="nav-btn active" data-view="today">今日</button>
      <button class="nav-btn" data-view="calendar">年曆</button>
      <button class="nav-btn" data-view="ip">IP</button>
      <button class="nav-btn" data-view="brands">賞圖鑑</button>
    </nav>
  </header>

  <!-- Today View -->
  <div id="view-today" class="view active">
    <main id="today-content" class="content">
      <div class="loading">載入中...</div>
    </main>
  </div>

  <!-- Calendar View -->
  <div id="view-calendar" class="view hidden">
    <div class="sticky-bar">
      <div class="month-nav" id="month-nav"></div>
    </div>
    <main id="calendar-content" class="content">
      <div class="loading">載入中...</div>
    </main>
  </div>

  <!-- IP View -->
  <div id="view-ip" class="view hidden">
    <div class="sticky-bar">
      <div class="ip-tabs" id="ip-tabs">
        <button class="tab-btn active" data-ip="ワンピース">航海王</button>
        <button class="tab-btn" data-ip="ドラゴンボール">七龍珠</button>
        <button class="tab-btn" data-ip="REBORN!">REBORN!</button>
        <button class="tab-btn" data-ip="ちいかわ">吉伊卡哇</button>
        <button class="tab-btn" data-ip="ジョジョ">JOJO</button>
      </div>
    </div>
    <main id="ip-content" class="content">
      <div class="loading">載入中...</div>
    </main>
  </div>

  <!-- Brands View -->
  <div id="view-brands" class="view hidden">
    <main id="brands-content" class="content"></main>
  </div>

  <script src="app.js"></script>
</body>
</html>
